<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер задач</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📋 Список дел</h1>
        <form action="/add" method="POST" class="add-form">
            <input type="text" name="title" placeholder="Новая задача..." required autofocus>
            <button type="submit">➕ Добавить</button>
        </form>
        <ul class="task-list">
            {% for task in tasks %}
            <li class="task-item {% if task.done %}completed{% endif %}">
                <span class="task-number">{{ loop.index }}.</span>
                <span class="task-title">{{ task.title }}</span>
                <div class="task-actions">
                    {% if not task.done %}
                    <a href="/done/{{ task.id }}" class="btn-done">✓ Выполнить</a>
                    {% else %}
                    <span class="done-label">✔️ Выполнено</span>
                    {% endif %}
                    <a href="/edit/{{ task.id }}" class="btn-edit">✏️ Редактировать</a>
                    <a href="/delete/{{ task.id }}" class="btn-delete" onclick="return confirm('Удалить задачу?')">🗑 Удалить</a>
                </div>
            </li>
            {% else %}
            <li class="empty-message">✨ Нет задач. Добавьте первую!</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
