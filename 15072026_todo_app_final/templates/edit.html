<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование задачи</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>✏️ Редактирование задачи</h1>
        <form action="/edit/{{ task.id }}" method="POST" class="add-form">
            <input type="text" name="title" value="{{ task.title }}" required autofocus>
            <button type="submit">💾 Сохранить</button>
            <a href="/" class="btn-delete" style="text-decoration: none; padding: 12px 25px;">❌ Отмена</a>
        </form>
    </div>
</body>
</html>
